version: '3.8'

services:
  streamlit-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: risk-assessment-tool
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
      - ./core:/app/core
      - ./app:/app/app
    environment:
      - HUGGINGFACE_API_KEY=${HUGGINGFACE_API_KEY}
      - APP_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
