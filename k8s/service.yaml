apiVersion: v1
kind: Service
metadata:
  name: risk-assessment-service
  labels:
    app: risk-assessment
spec:
  type: LoadBalancer  # Exposes the service externally
  selector:
    app: risk-assessment
  ports:
  - protocol: TCP
    port: 80         # External port
    targetPort: 8501 # Container port
    name: http
  sessionAffinity: ClientIP  # Maintains session stickiness
